<div id="ad-wrapper" style="text-align:center; font-family:Arial;">

  <!-- 🚫 СООБЩЕНИЕ -->
  <div id="adblock-message" style="
    display:block;
    background:#ff3b3b;
    color:white;
    padding:12px;
    font-size:14px;
    margin-bottom:10px;
  ">
    ⚠️ Пожалуйста, отключите блокировщик рекламы 🙏
  </div>

  <!-- 📢 РЕКЛАМА -->
  <div id="ad-slot">
    <script>
      atOptions = {
        'key' : '53d77db09bbc1a4e8dc18ee69f3dbcd8',
        'format' : 'iframe',
        'height' : 90,
        'width' : 728,
        'params' : {}
      };
    </script>
    <script src="https://lentspeaking.com/53d77db09bbc1a4e8dc18ee69f3dbcd8/invoke.js"></script>
  </div>

  <!-- 🟢 СТИКЕР -->
  <div style="margin-top:10px; font-size:12px; color:gray;">
    ⭐ Реклама помогает поддерживать сайт
  </div>

</div>

<script>
function checkAd() {
    const ad = document.getElementById("ad-slot");
    const msg = document.getElementById("adblock-message");

    // если внутри есть iframe или контент → реклама есть
    if (ad && ad.querySelector("iframe")) {
        msg.style.display = "none";
    } else {
        msg.style.display = "block";
    }
}

// проверяем несколько раз (важно!)
setTimeout(checkAd, 1000);
setTimeout(checkAd, 3000);
setTimeout(checkAd, 5000);
</script>
