<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

#continueBtn{
  display:none;
  background:green;

<body>

<h1>Смотреть рекламу</h1>

<button onclick="startAd()">▶ Смотреть рекламу</button>

<button id="continueBtn" onclick="finish()">
  Продолжить
</button>

<script>

function startAd() {
  alert("Реклама запущена");

  // тут запускается рекламный скрипт Monetag

  setTimeout(() => {
    document.getElementById("continueBtn").style.display = "inline-block";
  }, 8000); // 8 секунд ожидания
}

function finish(){
  document.body.innerHTML = "<h1>Спасибо за просмотр рекламы 👍</h1>";
}

</script>
